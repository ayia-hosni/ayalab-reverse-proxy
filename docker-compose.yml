# Terminates TLS for ayalab.co and api.ayalab.co and routes to whichever
# container on the shared `web` network advertises a matching VIRTUAL_HOST.
#
# One-time setup on the server (network must exist before frontend/backend
# compose stacks try to join it as external):
#   docker network create web
#
# Then bring this stack up first, followed by the frontend and backend stacks.
services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - web

  acme-companion:
    image: nginxproxy/acme-companion
    restart: unless-stopped
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL in .env}
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - nginx-proxy
    networks:
      - web

networks:
  web:
    external: true

volumes:
  certs:
  vhost:
  html:
  acme:
